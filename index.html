<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quicklist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <button class="back-btn">← Voltar</button>
    <h1>Lista de Compras</h1>

    <div class="input-group">
      <input type="text" id="itemInput" placeholder="Digite um item...">
      <button id="addBtn">Adicionar</button>
    </div>

    <ul id="list">
      <li>
        <input type="checkbox">
        <span>Arroz</span>
        <button class="delete">🗑️</button>
      </li>
      <li>
        <input type="checkbox">
        <span>Feijão</span>
        <button class="delete">🗑️</button>
      </li>
      <li>
        <input type="checkbox">
        <span>Leite</span>
        <button class="delete">🗑️</button>
      </li>
    </ul>

    <div id="toast" class="hidden">Item removido!</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
