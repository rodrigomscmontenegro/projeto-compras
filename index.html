<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quicklist - Lista de Compras</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <button id="btn-back">Voltar</button>
            <h1>Minhas Compras</h1>
        </header>

        <main>
            <form id="item-form">
                <input type="text" id="item-input" placeholder="Adicione um novo item..." aria-label="Novo item">
                <button type="submit" id="add-button">Adicionar item</button>
            </form>

            <ul id="shopping-list">
                <li class="item">
                    <div class="item-info">
                        <input type="checkbox">
                        <span>Pão de forma</span>
                    </div>
                    <button class="remove-btn" title="Remover item">🗑️</button>
                </li>
            </ul>
        </main>

        <div id="alert-footer" class="hidden">
            <span>O item foi removido da lista</span>
            <button id="close-alert">✕</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
